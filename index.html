<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 九州櫻花之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F9FA; color: #333; padding-bottom: 80px; }
        .highlight-food { color: #D62828; font-weight: 700; background: #FFEDED; padding: 1px 4px; border-radius: 4px; }
        .highlight-buy { color: #003049; font-weight: 700; background: #E9F5FF; padding: 1px 4px; border-radius: 4px; }
        .highlight-alert { color: #F77F00; font-weight: 700; border-bottom: 2px dashed #F77F00; }
        .type-transport { border-left: 6px solid #457B9D; }
        .type-attraction { border-left: 6px solid #2A9D8F; }
        .type-restaurant { border-left: 6px solid #E76F51; }
        .type-hotel { border-left: 6px solid #4F46E5; }
        .day-header { position: sticky; top: 60px; z-index: 40; background: #F8F9FA; border-radius: 8px; margin-top: 1.5rem; }
        .external-link { color: #2563EB; text-decoration: underline; word-break: break-all; font-weight: 500; }
        .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        /* 機票樣式 */
        .ticket-card { border-radius: 16px; border: 1px solid #e2e8f0; background: #fff; overflow: hidden; position: relative; margin-bottom: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .ticket-header { color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .jx-header { background: linear-gradient(135deg, #004d4f 0%, #002a2b 100%); }
        .br-header { background: linear-gradient(135deg, #00813f 0%, #005a2c 100%); }
        .ticket-airline { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 2px; }
        .ticket-body { padding: 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; text-align: center; }
        .airport-code { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; font-weight: bold; color: #1e293b; line-height: 1; }
        .airport-name { font-size: 0.8rem; color: #64748b; font-weight: 600; margin-top: 4px; }
        .airplane-icon { color: #cbd5e1; font-size: 1.6rem; margin: 0 15px; }
        .ticket-details { grid-column: span 3; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-top: 15px; border-top: 1px dashed #e2e8f0; margin-top: 15px; text-align: left; font-size: 0.85rem;}
        .ticket-label { color: #94a3b8; font-weight: 500; display: block; font-size: 0.7rem; text-transform: uppercase; }
        .ticket-value { color: #1e293b; font-weight: 700; font-size: 1rem; }
    </style>
</head>
<body>

    <header class="bg-white shadow-md sticky top-0 z-50 px-5 py-4">
        <h1 class="text-xl font-bold tracking-tighter text-center text-slate-800">2026 KYUSHU EXPEDITION</h1>
        <div class="flex justify-between items-center mt-2 text-[10px] text-slate-500 font-medium uppercase tracking-widest">
            <span><i class="fa-solid fa-plane-arrival mr-1 text-blue-500"></i> JX846 10:45 ARR</span>
            <span><i class="fa-solid fa-plane-departure mr-1 text-red-500"></i> BR101 19:20 DEP</span>
        </div>
    </header>

    <main id="app-content" class="p-4 space-y-4">
        </main>

    <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-around items-center py-3 pb-safe z-50">
        <button onclick="switchTab('itinerary')" class="nav-btn flex flex-col items-center text-blue-600">
            <i class="fa-solid fa-map-location-dot text-xl mb-1"></i>
            <span class="text-[10px] font-bold">每日行程</span>
        </button>
        <button onclick="switchTab('tools')" class="nav-btn flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-ticket-alt text-xl mb-1"></i>
            <span class="text-[10px] font-bold">機票飯店</span>
        </button>
        <button onclick="switchTab('checklist')" class="nav-btn flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-circle-check text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Checklist</span>
        </button>
    </nav>

<script>
    function parseHighlights(text) {
        if(!text) return "";
        return text
            .replace(/必吃[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-food">🍴 $1</span>')
            .replace(/必點[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-food">🔥 $1</span>')
            .replace(/必買[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-buy">🛍️ $1</span>')
            .replace(/(加油|提早|準時|預約|注意|務必|首要任務|拍照)[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-alert">⚠️ $1: $2</span>')
            .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="external-link">🔗 連結</a>');
    }

    const itineraryData = [
        {
            day: "Day 1：4/07 (二) 熊本落地攻城行動",
            weather: "熊本: 18°C 晴時多雲",
            items: [
                { time: "07:30", title: "桃園機場起飛 (JX846)", type: "transport", content: "星宇航空 JX846，第一航廈。開啟度假模式。" },
                { time: "10:45", title: "抵達熊本機場 (KMJ)", type: "transport", map: "熊本機場國際線大廳", content: "下機直奔海關，利用 VJW 快速通關。前往公車站 4 號月台。 https://www.vjw.digital.go.jp/" },
                { time: "12:15", title: "THE BLOSSOM 寄行李", type: "hotel", map: "THE BLOSSOM KUMAMOTO", content: "務必: 直奔 9 樓大廳寄放行李。開啟無行李旅客模式。" },
                { time: "12:40", title: "午餐：勝烈亭 (AMU 7F)", type: "restaurant", map: "勝烈亭 AMU PLAZA", content: "必吃: 炸豬排名店。為下午攻城儲備體力。" },
                { time: "14:15", title: "計程車 ➔ 熊本城二之丸", type: "transport", map: "熊本城二之丸入口", content: "4 人搭一車直達高點，開啟「全下坡」友善模式。" },
                { time: "16:15", title: "櫻之馬場城彩苑", type: "attraction", map: "櫻之馬場城彩苑", content: "必吃: 海膽、馬肉可樂餅、熊本熊人形燒。注意: 18:00 關門。" }
            ]
        },
        {
            day: "Day 2：4/08 (三) 阿蘇由布自駕環線",
            weather: "阿蘇/由布院: 15°C 涼爽",
            items: [
                { time: "08:00", title: "領車：Budget 租車", type: "transport", map: "Budget Rent a Car Kumamoto Station", content: "領取 7 人座 MPV Serena。務必: 檢查車況，8:30 發車。" },
                { time: "10:00", title: "阿蘇：草千里之濱", type: "attraction", map: "草千里之濱", content: "必喝: 草千里珈琲焙煎所。可以在二樓看草原吃阿蘇牛。" },
                { time: "13:00", title: "由布院深度享受", type: "restaurant", map: "由布院 釜飯心", content: "必點: 釜飯心。必買: Milch布丁、B-speak、吉吾炸雞。" },
                { time: "21:00", title: "黑亭拉麵 + 唐吉訶德", type: "restaurant", map: "黑亭拉麵 下通店", content: "必吃: 熊本拉麵。注意: 藥妝在熊本買齊，避開福岡排隊。" }
            ]
        },
        {
            day: "Day 3：4/09 (四) 高千穗神域散策",
            weather: "高千穗: 14°C 神聖霧氣",
            items: [
                { time: "07:00", title: "出發高千穗", type: "transport", content: "務必: 準時出發，預留 2 小時山路車程。" },
                { time: "09:30", title: "高千穗峽划船 (已預約)", type: "attraction", map: "高千穗峽 划船", content: "注意: 09:30 報到。拍照: 真名井瀑布、柱狀節理。" },
                { time: "11:15", title: "午餐：高千穗牛燒肉 和", type: "restaurant", map: "高千穗牛燒肉 和", content: "首要任務: 11:30 前抵達。必點: 沙朗牛排套餐。" },
                { time: "13:00", title: "高千穗神社 / 繞夫婦杉", type: "attraction", map: "高千穗神社", content: "注意: 手牽手繞夫婦杉 3 圈。必買: 對面 COSMOS 便宜草莓。" },
                { time: "17:00", title: "晚餐：高森田樂之里", type: "restaurant", map: "高森田樂之里", content: "必吃: 200 年古民家圍爐慢烤。體驗九州鄉土美味。" }
            ]
        },
        {
            day: "Day 4：4/10 (五) 熊本 ➔ 博多特種兵移動日",
            weather: "博多: 19°C 晴",
            items: [
                { time: "07:45", title: "熊本車站還車", type: "transport", map: "Budget Rent a Car Kumamoto Station", content: "注意: 還車前記得加油！結束自駕階段。" },
                { time: "12:17", title: "新幹線 (熊本 ➔ 博多)", type: "transport", content: "新幹線 Sakura 402 號。抵達後博多口步行 5 分到飯店。" },
                { time: "13:30", title: "博多車站買爆", type: "attraction", map: "博多車站", content: "必買: 松翁軒蛋糕、明太子。必吃: il FORNO del Mignon 小可頌。" },
                { time: "17:30", title: "晚餐：博多華味鳥", type: "restaurant", map: "博多華味鳥 駅前店", content: "預約: 駅前店離れ。享受正宗九州水炊鍋。" },
                { time: "22:30", title: "宵夜：藥院燒肉", type: "restaurant", map: "藥院燒肉博多店", content: "必點: 頂級和牛。深夜慶功，吃到高潮。" }
            ]
        },
        {
            day: "Day 5：4/11 (六) 太宰府賞櫻血拚日",
            weather: "福岡: 20°C 櫻吹雪預演",
            items: [
                { time: "09:00", title: "太宰府天滿宮", type: "attraction", map: "太宰府天滿宮", content: "注意: 摸神牛求好運。必吃: 梅枝餅。抽一蘭號碼牌。" },
                { time: "15:30", title: "入住大倉飯店 (休整)", type: "hotel", map: "Hotel Okura Fukuoka", content: "注意: 正式入房。吃太宰府買的點心，小睡避開人潮。" },
                { time: "16:30", title: "舞鶴公園・賞櫻", type: "attraction", map: "舞鶴公園", content: "拍照: 九州賞櫻聖地。路線: 赤坂站出站即達。" },
                { time: "20:30", title: "晚餐：前田屋牛腸鍋", type: "restaurant", map: "前田屋 今泉店", content: "預約: 20:30。必吃: 黑毛和牛牛腸鍋。" }
            ]
        },
        {
            day: "Day 6：4/12 (日) 天神血拼與歸途",
            weather: "福岡: 21°C 晴",
            items: [
                { time: "08:30", title: "大倉法式吐司早餐", type: "restaurant", content: "必吃: 大倉名物法式吐司。11:00 前辦理退房。" },
                { time: "11:30", title: "天神地下街終極掃貨", type: "attraction", map: "天神地下街", content: "最後補貨時間。掃蕩名產與藥妝小東西。" },
                { time: "16:45", title: "領行李 ➔ 計程車衝機場", type: "transport", map: "福岡機場國際線", content: "務必: 17:15 前抵達。班機起飛時間 19:20。" },
                { time: "19:20", title: "起飛回台 (BR101)", type: "transport", content: "長榮航空 BR101，抵達桃園第二航廈。圓滿結束。" }
            ]
        }
    ];

    function renderItinerary() {
        const container = document.getElementById('app-content');
        container.innerHTML = '';
        itineraryData.forEach(day => {
            const section = document.createElement('section');
            section.innerHTML = `
                <div class="day-header p-3 shadow-sm border border-slate-100 mb-4 rounded-xl flex justify-between items-center">
                    <h2 class="text-sm font-bold text-slate-800">${day.day}</h2>
                    <span class="text-[10px] text-blue-500 font-bold"><i class="fa-solid fa-cloud-sun mr-1"></i>${day.weather}</span>
                </div>`;
            day.items.forEach(item => {
                const card = document.createElement('div');
                card.className = `bg-white p-4 rounded-2xl card-shadow mb-4 ${item.type === 'transport' ? 'type-transport' : item.type === 'attraction' ? 'type-attraction' : item.type === 'restaurant' ? 'type-restaurant' : 'type-hotel'}`;
                const navUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.map || item.title)}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full">${item.time}</span>
                        ${item.map ? `<a href="${navUrl}" target="_blank" class="text-[10px] bg-blue-50 px-3 py-1.5 rounded-lg text-blue-600 font-bold active:scale-95 transition"><i class="fa-solid fa-diamond-turn-right mr-1"></i> 導航</a>` : ''}
                    </div>
                    <div class="font-bold text-slate-800 text-base mb-1">${item.title}</div>
                    <div class="text-[11px] text-slate-600 leading-relaxed">${parseHighlights(item.content)}</div>
                `;
                section.appendChild(card);
            });
            container.appendChild(section);
        });
    }

    function renderTools() {
        const container = document.getElementById('app-content');
        container.innerHTML = `
            <div class="space-y-6">
                <div class="ticket-card">
                    <div class="ticket-header jx-header">
                        <span class="ticket-airline">STARLUX AIRLINES</span>
                        <span class="text-[10px] opacity-75">TPE ➔ KMJ</span>
                    </div>
                    <div class="ticket-body">
                        <div>
                            <div class="airport-code text-blue-900">TPE</div>
                            <div class="airport-name">Taipei (T1)</div>
                        </div>
                        <i class="fa-solid fa-plane airplane-icon"></i>
                        <div>
                            <div class="airport-code text-blue-900">KMJ</div>
                            <div class="airport-name">Kumamoto</div>
                        </div>
                        <div class="ticket-details">
                            <div><span class="ticket-label">Date</span> <span class="ticket-value">APR 07 (TUE)</span></div>
                            <div><span class="ticket-label">Flight</span> <span class="ticket-value">JX 846</span></div>
                            <div><span class="ticket-label">Dep Time</span> <span class="ticket-value">07:30</span></div>
                            <div><span class="ticket-label">Arr Time</span> <span class="ticket-value">10:45</span></div>
                        </div>
                    </div>
                </div>

                <div class="ticket-card">
                    <div class="ticket-header br-header">
                        <span class="ticket-airline">EVA AIR</span>
                        <span class="text-[10px] opacity-75">FUK ➔ TPE</span>
                    </div>
                    <div class="ticket-body">
                        <div>
                            <div class="airport-code text-green-900">FUK</div>
                            <div class="airport-name">Fukuoka (Intl)</div>
                        </div>
                        <i class="fa-solid fa-plane airplane-icon"></i>
                        <div>
                            <div class="airport-code text-green-900">TPE</div>
                            <div class="airport-name">Taipei (T2)</div>
                        </div>
                        <div class="ticket-details">
                            <div><span class="ticket-label">Date</span> <span class="ticket-value">APR 12 (SUN)</span></div>
                            <div><span class="ticket-label">Flight</span> <span class="ticket-value">BR 101</span></div>
                            <div><span class="ticket-label">Dep Time</span> <span class="ticket-value">19:20</span></div>
                            <div><span class="ticket-label">Arr Time</span> <span class="ticket-value">20:45</span></div>
                        </div>
                    </div>
                </div>

                <h2 class="text-lg font-bold text-slate-800 border-l-4 border-slate-800 pl-3">飯店入住詳情</h2>
                
                <div class="bg-white p-5 rounded-2xl card-shadow border-l-8 border-indigo-500">
                    <h3 class="font-bold text-sm mb-3">THE BLOSSOM KUMAMOTO</h3>
                    <div class="text-[11px] space-y-2 text-slate-600">
                        <p><strong><i class="fa-solid fa-bed mr-1.5"></i> 房型：</strong> 標準大床房 (禁菸)</p>
                        <p><strong><i class="fa-solid fa-clock mr-1.5"></i> 入住時間：</strong> 4/07 15:00 - 4/10 11:00 (3晚)</p>
                        <p><strong><i class="fa-solid fa-location-dot mr-1.5"></i> 地址：</strong> 熊本県熊本市西区春日3-15-26</p>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl card-shadow border-l-8 border-blue-400">
                    <h3 class="font-bold text-sm mb-3">ANA Crowne Plaza Fukuoka</h3>
                    <div class="text-[11px] space-y-2 text-slate-600">
                        <p><strong><i class="fa-solid fa-bed mr-1.5"></i> 房型：</strong> 高級雙床房 (禁菸)</p>
                        <p><strong><i class="fa-solid fa-clock mr-1.5"></i> 入住時間：</strong> 4/10 15:00 - 4/11 11:00 (1晚)</p>
                        <p><strong><i class="fa-solid fa-location-dot mr-1.5"></i> 地址：</strong> 福岡市博多区博多駅前3-3-3</p>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl card-shadow border-l-8 border-teal-500">
                    <h3 class="font-bold text-sm mb-3">Hotel Okura Fukuoka (大倉)</h3>
                    <div class="text-[11px] space-y-2 text-slate-600">
                        <p><strong><i class="fa-solid fa-bed mr-1.5"></i> 房型：</strong> 標準雙人房 (禁菸)</p>
                        <p><strong><i class="fa-solid fa-clock mr-1.5"></i> 入住時間：</strong> 4/11 15:00 - 4/12 11:00 (1晚)</p>
                        <p><strong><i class="fa-solid fa-location-dot mr-1.5"></i> 地址：</strong> 福岡市博多区下川端町3-2</p>
                    </div>
                </div>
            </div>
        `;
    }

    function renderChecklist() {
        const container = document.getElementById('app-content');
        container.innerHTML = `
            <div class="bg-white p-6 rounded-3xl card-shadow border-t-8 border-amber-500">
                <h3 class="font-bold text-base mb-4 text-slate-800 border-b pb-2">出發前必備 Checklist</h3>
                <ul class="text-xs space-y-4 text-slate-600 font-medium">
                    <li class="flex items-start gap-3">✅ <span><strong>VJW 申報</strong>：下機前截圖 QR Code</span></li>
                    <li class="flex items-start gap-3">✅ <span><strong>信用卡優惠</strong>：確認玉山/國泰/台新機場券 🔗</span></li>
                    <li class="flex items-start gap-3">✅ <span><strong>餐廳預約</strong>：華味鳥(駅前店離れ)、前田屋(今泉店)</span></li>
                    <li class="flex items-start gap-3">✅ <span><strong>行李配重</strong>：回程 19:20 起飛，飯店秤重後再買。</span></li>
                </ul>
            </div>
        `;
    }

    function switchTab(tab) {
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.replace('text-blue-600', 'text-slate-400'));
        event.currentTarget.classList.replace('text-blue-600', 'text-blue-600'); // Dummy replace to keep logic
        const target = event.currentTarget;
        btns.forEach(b => b.classList.remove('text-blue-600'));
        btns.forEach(b => b.classList.add('text-slate-400'));
        target.classList.remove('text-slate-400');
        target.classList.add('text-blue-600');

        if(tab === 'itinerary') renderItinerary();
        else if(tab === 'tools') renderTools();
        else renderChecklist();
    }

    renderItinerary();
</script>
</body>
</html>
