<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 九州壯遊完全手冊 🌸🐻</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF5F7; color: #333; padding-bottom: 80px; }
        .highlight-food { color: #D62828; font-weight: 700; background: #FFEDED; padding: 1px 4px; border-radius: 4px; }
        .highlight-buy { color: #003049; font-weight: 700; background: #E9F5FF; padding: 1px 4px; border-radius: 4px; }
        .highlight-alert { color: #F77F00; font-weight: 700; border-bottom: 2px dashed #F77F00; }
        .type-transport { border-left: 6px solid #457B9D; }
        .type-attraction { border-left: 6px solid #2A9D8F; }
        .type-restaurant { border-left: 6px solid #E76F51; }
        .type-hotel { border-left: 6px solid #4F46E5; }
        .day-header { position: sticky; top: 60px; z-index: 40; background: #FFF5F7; border-radius: 8px; margin-top: 1rem; }
        .booking-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #FFD1DC; }
        .ticket-style { border-top: 8px solid #333; position: relative; overflow: hidden; }
        .airport-code { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #1e293b; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border-top: 1px dashed #e2e8f0; padding-top: 10px; }
        .info-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        .info-value { font-size: 0.85rem; color: #334155; font-weight: 700; }
        .check-cat { font-weight: 800; color: #1e293b; margin-top: 1.5rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .check-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid #fce7eb; }
        .tip-box { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; border-top: 4px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <header class="bg-white shadow-md sticky top-0 z-50 px-5 py-4">
        <h1 class="text-xl font-bold tracking-tighter text-center text-slate-800">
            🌸 2026 KYUSHU GRAND TOUR 🐻
        </h1>
        <div class="flex justify-between items-center mt-2 text-[10px] text-pink-500 font-bold uppercase tracking-widest">
            <span><i class="fa-solid fa-plane-arrival mr-1"></i> JX846 10:45 KMJ</span>
            <span><i class="fa-solid fa-plane-departure mr-1"></i> BR101 19:20 FUK</span>
        </div>
    </header>

    <main id="app-content" class="p-4 space-y-4"></main>

    <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-pink-100 flex justify-around items-center py-3 pb-safe z-50">
        <button id="tab-itinerary" onclick="switchTab('itinerary')" class="flex flex-col items-center text-pink-600">
            <i class="fa-solid fa-map-location-dot text-lg mb-1"></i>
            <span class="text-[9px] font-bold">全行程 🌸</span>
        </button>
        <button id="tab-booking" onclick="switchTab('booking')" class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-clipboard-check text-lg mb-1"></i>
            <span class="text-[9px] font-bold">預訂資訊 🐻</span>
        </button>
        <button id="tab-checklist" onclick="switchTab('checklist')" class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-tasks text-lg mb-1"></i>
            <span class="text-[9px] font-bold">Checklist</span>
        </button>
        <button id="tab-tips" onclick="switchTab('tips')" class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-lightbulb text-lg mb-1"></i>
            <span class="text-[9px] font-bold">專業叮嚀</span>
        </button>
    </nav>

<script>
    function parseHighlights(text) {
        if(!text) return "";
        return text
            .replace(/必吃[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-food">🍴 $1</span>')
            .replace(/必點[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-food">🔥 $1</span>')
            .replace(/必買[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-buy">🛍️ $1</span>')
            .replace(/(加油|提早|準時|預約|注意|務必|拍照|首要任務)[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-alert">⚠️ $1: $2</span>')
            .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#2563eb;text-decoration:underline;">🔗 連結</a>');
    }

    const itineraryData = [
        {
            day: "Day 1：4/07 (二) 熊本落地・攻城行動 🐻",
            weather: "18°C 晴時多雲",
            items: [
                { time: "07:30", title: "桃園起飛 (JX846)", type: "transport", content: "星宇航空，桃園 T1。預計 10:45 抵達熊本 KMJ。" },
                { time: "10:45", title: "抵達熊本機場", type: "transport", map: "熊本機場國際線大廳", content: "利用 VJW 快速通關。到 4 號公車站等車，跟司機說到熊本站。" },
                { time: "12:15", title: "THE BLOSSOM 寄物 🏨", type: "hotel", map: "THE BLOSSOM KUMAMOTO", content: "務必: 9樓大廳寄物。入住時加購最後一天早餐及車位。" },
                { time: "12:40", title: "午餐：勝烈亭 (AMU 7F)", type: "restaurant", map: "勝烈亭 AMU PLAZA", content: "必吃: 炸豬排名店。為下午攻城儲備體力。" },
                { time: "14:15", title: "計程車 ➔ 熊本城二之丸", type: "transport", content: "開啟全下坡模式。城彩苑必吃：海膽、馬肉可樂餅、熊本熊人形燒。" },
                { time: "17:15", title: "櫻町熊本 & 下通 🌸", type: "attraction", map: "櫻町熊本", content: "拍照: 超大熊本熊、頂級屋頂夕陽。逛 MUJI、PARCO。" }
            ]
        },
        {
            day: "Day 2：4/08 (三) 阿蘇由布・自駕環線 🚗",
            weather: "15°C 晴朗",
            items: [
                { time: "08:00", title: "領車：Budget 租車", type: "transport", map: "Budget Rent a Car Kumamoto Station", content: "領取 Serena 7人座。注意: 檢查車況，8:30 發車。" },
                { time: "10:00", title: "阿蘇：草千里之濱", type: "attraction", map: "草千里之濱", content: "必吃: 阿蘇牛。必喝: 草千里珈琲焙煎所。" },
                { time: "13:00", title: "由布院深度享受 (5hr)", type: "restaurant", map: "由布院 釜飯心", content: "必點: 釜飯心。必買: B-speak、鞠智銅鑼燒、Milch布丁、Telato抹茶。" },
                { time: "18:45", title: "日田車站 (里維兵長)", type: "attraction", map: "日田站", content: "拍照: 兵長銅像。回程可停山田/廣川SA。" }
            ]
        },
        {
            day: "Day 3：4/09 (四) 高千穗・神域散策 🚣",
            weather: "14°C 霧氣",
            items: [
                { time: "07:00", title: "出發高千穗", type: "transport", content: "務必: 準時，預留 2 小時車程。" },
                { time: "09:00", title: "抵達划船報到處", type: "attraction", map: "高千穗峽 划船", content: "務必: 提早 30 分鐘報到。觀看真名井瀑布。" },
                { time: "11:15", title: "午餐：高千穗牛燒肉 和", type: "restaurant", map: "高千穗牛燒肉 和", content: "首要任務: 11:30前抵達。必點: 沙朗牛排。" },
                { time: "13:00", title: "高千穗神社 / 藥妝", type: "attraction", map: "高千穗神社", content: "注意: 繞夫婦杉3圈。必買: COSMOS 便宜草莓。" },
                { time: "17:00", title: "晚餐：高森田樂之里", type: "restaurant", map: "高森田樂之里", content: "必吃: 200 年古民家圍爐慢烤。" }
            ]
        },
        {
            day: "Day 4：4/10 (五) 熊本 ➔ 博多・雙主餐 🥩",
            weather: "19°C 陰",
            items: [
                { time: "07:45", title: "還車：Budget 租車", type: "transport", map: "Budget Rent a Car Kumamoto Station", content: "注意: 還車前記得加油！" },
                { time: "12:17", title: "新幹線 (Sakura 402)", type: "transport", content: "綠色車廂。12:57 抵博多。入住 ANA 飯店。" },
                { time: "13:30", title: "博多車站採購", type: "attraction", map: "博多車站", content: "必吃: 努努雞、小可頌。必買: 明太子、鈴懸、治一郎。" },
                { time: "17:30", title: "晚餐：博多華味鳥", type: "restaurant", map: "博多華味鳥 駅前店離れ", content: "預約: 駅前店離れ。享用味 Course。" },
                { time: "22:30", title: "宵夜：燒肉肉いち 博多店", type: "restaurant", map: "燒肉肉いち 博多店", content: "必吃: 頂級和牛。注意: 是博多店。" }
            ]
        },
        {
            day: "Day 5：4/11 (六) 太宰府・賞櫻 🌸",
            weather: "20°C 晴",
            items: [
                { time: "09:00", title: "太宰府天滿宮", type: "attraction", map: "太宰府天滿宮", content: "買 Dacomecca。摸神牛、抽一蘭號碼牌。" },
                { time: "15:30", title: "大倉飯店入住", type: "hotel", map: "Hotel Okura Fukuoka", content: "入住小睡，避開週六午後人潮。" },
                { time: "16:30", title: "舞鶴公園・賞櫻 🌸", type: "attraction", map: "舞鶴公園", content: "賞櫻: 櫻吹雪。赤坂站出站即達。" },
                { time: "20:30", title: "晚餐：前田屋牛腸鍋", type: "restaurant", map: "前田屋 今泉店", content: "預約: 20:30。必吃: 黑毛和牛牛腸鍋。" }
            ]
        },
        {
            day: "Day 6：4/12 (日) 歸途 ✈️",
            weather: "21°C 晴",
            items: [
                { time: "08:30", title: "大倉早餐", type: "restaurant", content: "必吃: 法式吐司。" },
                { time: "11:30", title: "天神地下街掃貨", type: "attraction", map: "天神地下街", content: "最後補貨。飯店秤重後退房。" },
                { time: "17:20", title: "機場報到", type: "transport", map: "福岡機場國際線", content: "必買: 福砂屋、松翁軒、一蘭泡麵。" },
                { time: "19:20", title: "起飛回台 (BR101)", type: "transport", content: "長榮航空，桃園 T2。" }
            ]
        }
    ];

    function renderItinerary() {
        const container = document.getElementById('app-content');
        container.innerHTML = '';
        itineraryData.forEach(day => {
            const section = document.createElement('section');
            section.innerHTML = `<div class="day-header p-3 border border-pink-100 mb-4 rounded-xl flex justify-between items-end shadow-sm"><h2 class="text-sm font-bold text-slate-800">${day.day}</h2><span class="text-[9px] text-pink-500 font-bold uppercase"><i class="fa-solid fa-cloud-sun mr-1"></i>${day.weather}</span></div>`;
            day.items.forEach(item => {
                const card = document.createElement('div');
                card.className = `bg-white p-4 rounded-2xl card-shadow mb-4 ${item.type === 'transport' ? 'type-transport' : item.type === 'attraction' ? 'type-attraction' : item.type === 'restaurant' ? 'type-restaurant' : 'type-hotel'}`;
                const navUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.map || item.title)}`;
                card.innerHTML = `<div class="flex justify-between items-center mb-1.5"><span class="text-[10px] font-black text-slate-300 uppercase">${item.time}</span>${item.map ? `<a href="${navUrl}" target="_blank" class="text-[9px] bg-pink-50 px-2 py-1 rounded-md text-pink-600 font-bold">導航 📍</a>` : ''}</div><div class="font-bold text-slate-800 text-sm mb-1">${item.title}</div><div class="text-[10px] text-slate-500 leading-relaxed">${parseHighlights(item.content)}</div>`;
                section.appendChild(card);
            });
            container.appendChild(section);
        });
    }

    function renderBooking() {
        const container = document.getElementById('app-content');
        container.innerHTML = `
            <div class="space-y-4 pb-10">
                <h2 class="text-lg font-bold text-slate-800 border-l-4 border-pink-500 pl-3">✈️ 機票與航廈 ✈️</h2>
                <div class="booking-card ticket-style">
                    <div class="flex justify-between items-center mb-1"><span class="ticket-airline text-blue-900">STARLUX JX846</span></div>
                    <div class="flex justify-between items-center px-2"><div><div class="airport-code">TPE</div><div class="text-[9px]">桃園 T1</div></div><i class="fa-solid fa-plane text-slate-200"></i><div><div class="airport-code">KMJ</div><div class="text-[9px]">熊本</div></div></div>
                    <div class="info-grid"><div><div class="info-label">航廈</div><div class="info-value">桃園 T1</div></div><div><div class="info-label">Time</div><div class="info-value">07:30-10:45</div></div></div>
                </div>
                <div class="booking-card ticket-style" style="border-top-color:#00813f;">
                    <div class="flex justify-between items-center mb-1"><span class="ticket-airline text-green-800">EVA AIR BR101</span></div>
                    <div class="flex justify-between items-center px-2"><div><div class="airport-code">FUK</div><div class="text-[9px]">福岡 Intl</div></div><i class="fa-solid fa-plane text-slate-200"></i><div><div class="airport-code">TPE</div><div class="text-[9px]">桃園 T2</div></div></div>
                    <div class="info-grid"><div><div class="info-label">航廈</div><div class="info-value">桃園 T2</div></div><div><div class="info-label">Time</div><div class="info-value">19:20-20:45</div></div></div>
                </div>

                <h2 class="text-lg font-bold text-slate-800 border-l-4 border-pink-500 pl-3 mt-4">🏨 飯店進退房 🐻</h2>
                <div class="booking-card border-l-4 border-indigo-500">
                    <div class="font-bold text-sm">THE BLOSSOM 熊本 (4/7-4/10)</div>
                    <div class="text-[11px] text-slate-500 mt-1">入住: 15:00 / 退房: 11:00</div>
                </div>
                <div class="booking-card border-l-4 border-indigo-500">
                    <div class="font-bold text-sm">ANA Crowne Plaza (4/10-4/11)</div>
                    <div class="text-[11px] text-slate-500 mt-1">入住: 15:00 / 退房: 11:00</div>
                </div>
                <div class="booking-card border-l-4 border-indigo-500">
                    <div class="font-bold text-sm">大倉飯店 Hotel Okura (4/11-4/12)</div>
                    <div class="text-[11px] text-slate-500 mt-1">入住: 15:00 / 退房: 11:00</div>
                </div>

                <h2 class="text-lg font-bold text-slate-800 border-l-4 border-pink-500 pl-3 mt-4">📋 預約詳情</h2>
                <div class="booking-card border-l-4 border-orange-500 text-[11px] space-y-2">
                    <p>🚗 <strong>租車：</strong>4/08 08:00 (Serena 7人座) - 32,730日圓</p>
                    <p>🚣 <strong>划船：</strong>4/09 09:30 (提早30分報到) - 4,100日圓</p>
                    <p>🚄 <strong>新幹線：</strong>4/10 12:17 (Sakura 402 綠色車廂)</p>
                    <p>🥢 <strong>華味鳥：</strong>4/10 17:30 (駅前店離れ)</p>
                    <p>🥩 <strong>燒肉肉いち 博多店：</strong>4/10 22:30</p>
                </div>
            </div>`;
    }

    function renderChecklist() {
        const container = document.getElementById('app-content');
        container.innerHTML = `
            <div class="bg-white p-6 rounded-3xl card-shadow pb-10">
                <h2 class="text-xl font-bold text-slate-800 mb-2">專業準備清單 🌸</h2>
                <div class="check-cat"><i class="fa-solid fa-id-card text-pink-500"></i> 證件與法規</div>
                <div class="check-item"><span>⬜</span> <div class="text-xs"><strong>護照正本 + 中文駕照 + 日文譯本</strong> (自駕必備)</div></div>
                <div class="check-item"><span>⬜</span> <div class="text-xs"><strong>VJW QR Code</strong> (截圖儲存)</div></div>
                <div class="check-cat"><i class="fa-solid fa-yen-sign text-green-500"></i> 財務準備</div>
                <div class="check-item"><span>⬜</span> <div class="text-xs"><strong>日圓現鈔</strong> (划船/屋台/神社僅收現)</div></div>
                <div class="check-item"><span>⬜</span> <div class="text-xs"><strong>高回饋信用卡</strong> (AMU/天神採購用)</div></div>
                <div class="check-cat"><i class="fa-solid fa-mobile-screen text-indigo-500"></i> 軟體工具</div>
                <div class="check-item"><span>⬜</span> <div class="text-xs"><strong>Tenki.JP</strong> (看天氣神器) / <strong>Voicetra</strong></div></div>
                <div class="check-cat"><i class="fa-solid fa-triangle-exclamation text-red-500"></i> 行程關鍵</div>
                <div class="check-item"><span>⬜</span> <div class="text-xs"><strong>還車加油收據</strong> (Day 4 還車前準備)</div></div>
                <div class="check-item"><span>⬜</span> <div class="text-xs"><strong>行李配重</strong> (Day 6 退房前秤重)</div></div>
            </div>`;
    }

    function renderTips() {
        const container = document.getElementById('app-content');
        container.innerHTML = `
            <div class="pb-10">
                <h2 class="text-xl font-bold text-slate-800 mb-6 border-l-4 border-slate-800 pl-3">專業旅人叮嚀 🐻</h2>
                <div class="tip-box"><div class="tip-title">🚗 自駕與山路風險</div><p class="text-[11px] text-slate-600">Serena 車身寬，高千穗與由布院路段窄。若遇濃霧車程會變長。</p></div>
                <div class="tip-box"><div class="tip-title">🚣 划船報到死線</div><p class="text-[11px] text-slate-600">09:00 前需報到。遲到名額釋放。建議 Day 3 提早出發。</p></div>
                <div class="tip-box"><div class="tip-title">🥩 雙晚餐戰略</div><p class="text-[11px] text-slate-600">華味鳥雞湯粥淺嚐即可，保留戰鬥力給深夜和牛肉いち。</p></div>
                <div class="tip-box"><div class="tip-title">✈️ 機場壓力提醒</div><p class="text-[11px] text-slate-600">櫻花季機場安檢排隊長。19:20 起飛，務必 17:00 前抵達機場。</p></div>
            </div>`;
    }

    function switchTab(tab) {
        const btns = document.querySelectorAll('nav button');
        btns.forEach(b => b.classList.replace('text-pink-600', 'text-slate-400'));
        document.getElementById('tab-' + tab).classList.replace('text-slate-400', 'text-pink-600');
        
        if(tab === 'itinerary') renderItinerary();
        else if(tab === 'booking') renderBooking();
        else if(tab === 'checklist') renderChecklist();
        else renderTips();
    }
    renderItinerary();
</script>
</body>
</html>
