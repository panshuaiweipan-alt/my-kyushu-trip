<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 九州櫻花之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F9FA; color: #333; padding-bottom: 80px; }
        .highlight-food { color: #D62828; font-weight: 700; background: #FFEDED; padding: 1px 4px; border-radius: 4px; }
        .highlight-buy { color: #003049; font-weight: 700; background: #E9F5FF; padding: 1px 4px; border-radius: 4px; }
        .highlight-alert { color: #F77F00; font-weight: 700; border-bottom: 2px dashed #F77F00; }
        .type-transport { border-left: 6px solid #457B9D; }
        .type-attraction { border-left: 6px solid #2A9D8F; }
        .type-restaurant { border-left: 6px solid #E76F51; }
        .day-header { position: sticky; top: 60px; z-index: 40; background: #F8F9FA; border-radius: 8px; margin-top: 1.5rem; }
        .external-link { color: #2563EB; text-decoration: underline; word-break: break-all; font-weight: 500; }
        .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    </style>
</head>
<body>

    <header class="bg-white shadow-md sticky top-0 z-50 px-5 py-4">
        <h1 class="text-xl font-bold tracking-tighter text-center text-slate-800">2026 KYUSHU GRAND TOUR</h1>
        <div class="flex justify-between items-center mt-2 text-[10px] text-slate-500 font-medium">
            <span><i class="fa-solid fa-plane-arrival mr-1 text-blue-500"></i> 4/07 10:45</span>
            <span><i class="fa-solid fa-plane-departure mr-1 text-red-500"></i> 4/12 19:20</span>
        </div>
    </header>

    <main id="app-content" class="p-4 space-y-4">
        </main>

    <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-around items-center py-3 pb-safe z-50">
        <button onclick="switchTab('itinerary')" class="nav-btn flex flex-col items-center text-blue-600 transition-colors">
            <i class="fa-solid fa-map-location-dot text-xl mb-1"></i>
            <span class="text-[10px] font-bold">全行程</span>
        </button>
        <button onclick="switchTab('tools')" class="nav-btn flex flex-col items-center text-slate-400 transition-colors">
            <i class="fa-solid fa-suitcase-rolling text-xl mb-1"></i>
            <span class="text-[10px] font-bold">重要資訊</span>
        </button>
        <button onclick="switchTab('checklist')" class="nav-btn flex flex-col items-center text-slate-400 transition-colors">
            <i class="fa-solid fa-circle-check text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Checklist</span>
        </button>
    </nav>

<script>
    function parseHighlights(text) {
        if(!text) return "";
        return text
            .replace(/必吃[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-food">🍴 $1</span>')
            .replace(/必點[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-food">🔥 $1</span>')
            .replace(/必買[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-buy">🛍️ $1</span>')
            .replace(/(加油|提早|準時|預約|注意|務必|首要任務|拍照)[:：]?\s*([^，。！、\s]+)/g, '<span class="highlight-alert">⚠️ $1: $2</span>')
            .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="external-link">🔗 連結</a>');
    }

    const itineraryData = [
        {
            day: "Day 1：4/07 (二) 熊本城・AMU美食攻堅",
            weather: "熊本: 18°C 晴時多雲",
            items: [
                { time: "10:45", title: "抵達熊本機場", type: "transport", map: "熊本機場", content: "下機直奔海關，利用 VJW 快速通關。到4號公車站等車。 https://www.vjw.digital.go.jp/" },
                { time: "12:15", title: "THE BLOSSOM 寄物", type: "attraction", map: "THE BLOSSOM KUMAMOTO", content: "務必: 直奔9樓大廳寄放行李，開啟無行李旅客模式。" },
                { time: "12:40", title: "午餐：勝烈亭 (AMU 7F)", type: "restaurant", map: "勝烈亭 AMU PLAZA", content: "必吃: 炸豬排名店。為下午攻城儲備體力。" },
                { time: "14:15", title: "計程車 ➔ 熊本城二之丸", type: "transport", map: "熊本城二之丸入口", content: "4人搭一車直達高點，開啟「全下坡」友善模式。 https://castle.kumamoto-guide.jp/info/" },
                { time: "16:15", title: "櫻之馬場城彩苑", type: "attraction", map: "櫻之馬場城彩苑", content: "必吃: 海膽、馬肉可樂餅、熊本熊人形燒。注意: 營業到18:00。" },
                { time: "18:15", title: "AMU PLAZA 採購", type: "attraction", map: "AMU PLAZA 熊本", content: "鎖定 1F BEAMS、4F UNIQLO、5F GU。務必: 退稅櫃台在1樓！" },
                { time: "20:00", title: "AMU 7F 晚餐", type: "restaurant", map: "AMU PLAZA 熊本", content: "候選：廻る寿司 めっけもん、和牛焼肉リーベ。" }
            ]
        },
        {
            day: "Day 2：4/08 (三) 阿蘇由布大環線",
            weather: "阿蘇/由布院: 15°C 涼爽",
            items: [
                { time: "08:00", title: "領車：Budget 租車", type: "transport", map: "Budget Rent a Car Kumamoto Station", content: "領取 7 人座 MPV (Serena)。務必: 檢查車況，8:30 準時發車。" },
                { time: "10:00", title: "阿蘇：草千里/火山口", type: "attraction", map: "草千里之濱", content: "拍照: 二樓看草原吃阿蘇牛。必喝: 草千里珈琲焙煎所。" },
                { time: "11:00", title: "阿蘇 ➔ 由布院 (山並公路)", type: "transport", map: "大觀峰展望所", content: "必走: 山並公路 (Yamanami) 最爽自駕路段。停留大觀峰。" },
                { time: "13:00", title: "由布院深度享受", type: "restaurant", map: "由布院 釜飯心", content: "必點: 釜飯心 (特色三吃)。必買: Milch布丁、B-speak、吉吾炸雞。" },
                { time: "18:45", title: "日田車站 (里維兵長)", type: "attraction", map: "日田站", content: "拍照: 兵長銅像合影。快閃 30 分鐘。" },
                { time: "21:00", title: "黑亭拉麵 + 唐吉訶德", type: "restaurant", map: "黑亭拉麵 下通店", content: "必吃: 黑亭拉麵。注意: 藥妝零食在熊本買齊，避開福岡排隊。" }
            ]
        },
        {
            day: "Day 3：4/09 (四) 高千穗神域之旅",
            weather: "高千穗: 14°C 霧氣神聖",
            items: [
                { time: "07:00", title: "熊本飯店出發", type: "transport", map: "THE BLOSSOM KUMAMOTO", content: "務必: 準時出發，預留 2 小時山路車程。" },
                { time: "09:30", title: "高千穗峽划船 (預約)", type: "attraction", map: "高千穗峽 划船", content: "預約: 09:30 報到。拍照: 真名井瀑布、柱狀節理。" },
                { time: "11:15", title: "午餐：高千穗牛燒肉 和", type: "restaurant", map: "高千穗牛燒肉 和", content: "首要任務: 11:30 開門前抵達衝第一波。必點: 沙朗牛排。" },
                { time: "13:00", title: "高千穗神社 / 藥妝店", type: "attraction", map: "高千穗神社", content: "注意: 與伴侶繞夫婦杉 3 圈。必買: 對面 COSMOS 便宜草莓。" },
                { time: "14:10", title: "天安河原 / 天岩戶神社", type: "attraction", map: "天安河原", content: "拍照: 石堆洞穴能量場。注意: 順手疊石堆許願。" },
                { time: "17:00", title: "晚餐：高森田樂之里", type: "restaurant", map: "高森田樂之里", content: "必吃: 200 年古民家圍爐慢烤。享受慢活。" }
            ]
        },
        {
            day: "Day 4：4/10 (五) 移動日・博多雙主餐",
            weather: "博多: 19°C 晴天",
            items: [
                { time: "07:45", title: "熊本車站還車", type: "transport", map: "Budget Rent a Car Kumamoto Station", content: "注意: 還車前記得加油！8:00 解除自駕任務。" },
                { time: "12:17", title: "新幹線 (熊本 ➔ 博多)", type: "transport", map: "熊本車站", content: "Sakura 402 號。車上休息，博多口步行 5 分到飯店。" },
                { time: "13:30", title: "博多車站大採購", type: "attraction", map: "博多車站", content: "必買: 松翁軒、明太子。必吃: il FORNO del Mignon 小可頌。" },
                { time: "17:30", title: "晚餐：博多華味鳥", type: "restaurant", map: "博多華味鳥 駅前店", content: "預約: 享用水炊鍋。注意: 雞湯精華必喝。" },
                { time: "22:30", title: "宵夜：藥院燒肉", type: "restaurant", map: "藥院燒肉博多店", content: "必點: 頂級和牛。慶功高潮，吃到爽。" }
            ]
        },
        {
            day: "Day 5：4/11 (六) 太宰府・賞櫻戰略",
            weather: "福岡: 20°C 櫻吹雪",
            items: [
                { time: "09:00", title: "太宰府天滿宮", type: "attraction", map: "太宰府天滿宮", content: "注意: 先抽一蘭號碼牌。拍照: 摸神牛。必吃: 梅枝餅。" },
                { time: "15:30", title: "飯店轉場 (大倉)", type: "hotel", map: "Hotel Okura Fukuoka", content: "注意: 正式入房小睡，避開週六午後人潮。" },
                { time: "16:30", title: "舞鶴公園 ➔ 大濠公園", type: "attraction", map: "舞鶴公園", content: "拍照: 櫻吹雪美景。路線: 赤坂站 2 號出口出站。" },
                { time: "20:30", title: "晚餐：前田屋牛腸鍋", type: "restaurant", map: "前田屋 今泉店", content: "預約: 20:30。必吃: 黑毛和牛牛腸鍋。最後加點雜炊。" }
            ]
        },
        {
            day: "Day 6：4/12 (日) 歸途・終極血拼",
            weather: "福岡機場: 21°C 晴天",
            items: [
                { time: "08:30", title: "大倉早餐", type: "restaurant", map: "Hotel Okura Fukuoka", content: "必吃: 法式吐司。享受舒服的最後一餐。" },
                { time: "11:30", title: "天神地下街終極血拼", type: "attraction", map: "天神地下街", content: "必買: 橫掃名產。注意: 退房前飯店秤重行李。" },
                { time: "14:30", title: "警固神社 & 藍瓶咖啡", type: "restaurant", map: "Blue Bottle Coffee Fukuoka", content: "注意: 神社內靜心喝咖啡。最後打卡。" },
                { time: "17:00", title: "計程車衝機場", type: "transport", map: "福岡機場", content: "務必: 17:20 前抵達櫃檯。預約: 機場福砂屋 CUBE 卡兌換。" },
                { time: "19:20", title: "起飛回台", type: "transport", content: "九州壯遊圓滿收官。" }
            ]
        }
    ];

    function renderItinerary() {
        const container = document.getElementById('app-content');
        container.innerHTML = '';
        itineraryData.forEach(day => {
            const section = document.createElement('section');
            section.innerHTML = `
                <div class="day-header p-3 shadow-sm border border-slate-100 mb-4 rounded-xl flex justify-between items-center">
                    <h2 class="text-sm font-bold text-slate-800">${day.day}</h2>
                    <span class="text-[10px] text-blue-500 font-bold"><i class="fa-solid fa-cloud-sun"></i> ${day.weather}</span>
                </div>`;
            day.items.forEach(item => {
                const card = document.createElement('div');
                card.className = `bg-white p-4 rounded-2xl card-shadow mb-4 ${item.type === 'transport' ? 'type-transport' : item.type === 'attraction' ? 'type-attraction' : item.type === 'restaurant' ? 'type-restaurant' : 'border-l-6 border-indigo-400'}`;
                const navUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.map)}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full">${item.time}</span>
                        ${item.map ? `<a href="${navUrl}" target="_blank" class="text-[10px] bg-blue-50 px-3 py-1.5 rounded-lg text-blue-600 font-bold active:scale-95 transition"><i class="fa-solid fa-diamond-turn-right mr-1"></i> 導航</a>` : ''}
                    </div>
                    <div class="font-bold text-slate-800 text-base mb-1">${item.title}</div>
                    <div class="text-[11px] text-slate-600 leading-relaxed">${parseHighlights(item.content)}</div>
                `;
                section.appendChild(card);
            });
            container.appendChild(section);
        });
    }

    function renderTools() {
        const container = document.getElementById('app-content');
        container.innerHTML = `
            <div class="space-y-4">
                <div class="bg-white p-6 rounded-3xl card-shadow border-t-8 border-blue-500">
                    <h3 class="font-bold text-base mb-4"><i class="fa-solid fa-hotel mr-2 text-blue-500"></i> 住宿清單</h3>
                    <div class="text-xs space-y-4 text-slate-600">
                        <div class="flex justify-between items-start">
                            <span><strong>熊本 (4/7-4/9)</strong><br>THE BLOSSOM KUMAMOTO</span>
                            <a href="https://www.jrk-hotels.co.jp/tw/Kumamoto/" target="_blank" class="text-blue-500 font-bold">官網 🔗</a>
                        </div>
                        <div class="flex justify-between items-start">
                            <span><strong>博多 (4/10)</strong><br>ANA Crowne Plaza</span>
                            <a href="https://www.ihg.com/crowneplaza/hotels/tw/zh/fukuoka/hakja/hoteldetail" target="_blank" class="text-blue-500 font-bold">官網 🔗</a>
                        </div>
                        <div class="flex justify-between items-start">
                            <span><strong>天神 (4/11)</strong><br>Hotel Okura Fukuoka</span>
                            <a href="https://www.fukuhoku.hotelokura.co.jp/zh-tw/" target="_blank" class="text-blue-500 font-bold">官網 🔗</a>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-3xl card-shadow border-t-8 border-red-500">
                    <h3 class="font-bold text-base mb-2"><i class="fa-solid fa-plane-up mr-2 text-red-500"></i> 回程航班</h3>
                    <p class="text-xs text-slate-600 font-bold">4/12 (日) 19:20 福岡機場 (FUK) 起飛</p>
                </div>
            </div>
        `;
    }

    function renderChecklist() {
        const container = document.getElementById('app-content');
        container.innerHTML = `
            <div class="bg-white p-6 rounded-3xl card-shadow">
                <h3 class="font-bold text-base mb-4 text-slate-800 border-b pb-2">出發前必備 Checklist</h3>
                <ul class="text-xs space-y-4 text-slate-600">
                    <li class="flex items-start gap-3">✅ <span><strong>VJW 申報</strong>：下機前截圖 QR Code</span></li>
                    <li class="flex items-start gap-3">✅ <span><strong>信用卡優惠</strong>：玉山/台新/國泰機場免稅券 🔗</span></li>
                    <li class="flex items-start gap-3">✅ <span><strong>預約代碼</strong>：划船/華味鳥/前田屋 (信箱確認)</span></li>
                    <li class="flex items-start gap-3">✅ <span><strong>行李配重</strong>：回程天神補貨後務必秤重</span></li>
                </ul>
            </div>
        `;
    }

    function switchTab(tab) {
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.replace('text-blue-600', 'text-slate-400'));
        event.currentTarget.classList.replace('text-slate-400', 'text-blue-600');
        if(tab === 'itinerary') renderItinerary();
        else if(tab === 'tools') renderTools();
        else renderChecklist();
    }

    renderItinerary();
</script>
</body>
</html>
